site_name: IdentraCore IAM Documentation
site_description: Identity and Access Management product documentation for IdentraCore IAM 5.x
site_author: IdentraCore Documentation Team

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Overview:
    - Product Overview: overview/product-overview.md
    - Key Concepts: overview/key-concepts.md
    - Architecture: overview/architecture.md
  - Authentication:
    - SSO Configuration: authentication/sso-configuration.md
    - SAML 2.0 Setup: authentication/saml-setup.md
    - MFA Setup: authentication/mfa-setup.md
  - Authorization:
    - RBAC Overview: authorization/rbac-overview.md
    - Creating Roles: authorization/creating-roles.md
    - Managing Policies: authorization/managing-policies.md
  - Administration:
    - User Management: administration/user-management.md
    - Audit Logs: administration/audit-logs.md
  - Troubleshooting:
    - Common Errors: troubleshooting/common-errors.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
