name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: |
          pip install mkdocs-material mkdocs-with-pdf weasyprint

      - name: Build documentation with PDF
        run: |
          export ENABLE_PDF_EXPORT=1
          mkdocs build --site-dir site
          echo "--- Verifying PDF ---"
          ls -lh site/pdf/ || echo "ERROR: site/pdf/ not found"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --no-build --site-dir site
