name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENABLE_PDF_EXPORT: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: |
          pip install mkdocs-material mkdocs-with-pdf weasyprint

      - name: Build documentation with PDF
        run: |
          mkdocs build --site-dir site
          echo "--- Verifying PDF ---"
          ls -lh site/pdf/ || echo "ERROR: site/pdf/ not found"

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-new
          git rm -rf . --quiet
          cp -r site/. .
          rm -rf site
          touch .nojekyll
          git add -A
          git commit -m "Deploy docs with PDF [skip ci]"
          git push origin HEAD:gh-pages --force